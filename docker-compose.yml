services:
  db:
    image: postgres:alpine

    environment:
      POSTGRES_PASSWORD: 1234567
      POSTGRES_USER: root
      POSTGRES_DB: db
      PGDATA: /var/lib/postgresql/data/pgdata

    ports:
      - "5432:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data/pgdata
    
  redis:
    image: redis:alpine

    ports:
      - "6379:6379"

    volumes:
      - redisdata:/data

  s3:
    image: quay.io/minio/minio

    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - data-minio:/data
    environment:
      MINIO_ROOT_USER: root
      MINIO_ROOT_PASSWORD: 12345678

    command: server --console-address ":9001" /data

volumes:
  redisdata:
  data-minio:
  pgdata: