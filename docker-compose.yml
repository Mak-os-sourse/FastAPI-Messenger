services:
  db:
    image: postgres:alpine

    environment:
      POSTGRES_PASSWORD: 1234567
      POSTGRES_USER: root
      POSTGRES_DB: db
      PGDATA: /var/lib/postgresql/data/pgdata

    ports:
      - "5432:5432"

    volumes:
      - .pgdata:/var/lib/postgresql/data/pgdata
    
  redid:
    image: redis:alpine

    ports:
      - "6379:6379"

    volumes:
      - .redisdata:/data